<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Dhananjaya Prasad Photography</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 8px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            cursor: pointer;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Dhananjaya Prasad Photography" onerror="this.onerror=null; this.src='https://via.placeholder.com/250x40/000000/FFFFFF?text=DHANANJAYA+PRASAD';">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="services.html">Services</a></li>
                <li class="nav-dropdown">
                    <a href="gallery.html">Gallery <i class="fa-solid fa-chevron-down" style="font-size: 0.7em; margin-left: 3px;"></i></a>
                    <ul class="dropdown-content">
                        <li><a href="gallery.html">All Works</a></li>
                        <li><a href="featured-works.html">Feature</a></li>
                    </ul>
                </li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                        <i class="fa-solid fa-sun"></i>
                    </button>
                </li>
            </ul>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="hidden">Image Gallery</h1>
    </div>

    <!-- Gallery Content -->
    <section class="section">
        <div class="container">
            <div class="gallery-filters" style="text-align: center; margin-bottom: 40px;">
                <select id="gallery-category" onchange="if(this.value) window.location.href=this.value;" style="padding: 12px 24px; font-family: 'Inter', sans-serif; font-size: 1rem; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; appearance: none; -webkit-appearance: none; text-align: center;">
                    <option value="gallery.html" selected>All Works</option>
                    <option value="featured-works.html" style="background: var(--bg-color); color: var(--text-color);">Feature</option>
                </select>
                <div style="pointer-events: none; position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: center; padding-right: 15px; display: inline-block; margin-left: -30px;">
                    <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem;"></i>
                </div>
            </div>
            <div class="gallery-grid">
                <div class="gallery-item hidden"><img src="https://images.unsplash.com/photo-1492633423870-43d1cd2775eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 1"></div>
                <div class="gallery-item hidden" style="transition-delay: 0.1s;"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 2"></div>
                <div class="gallery-item hidden" style="transition-delay: 0.2s;"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 3"></div>
                <div class="gallery-item hidden" style="transition-delay: 0.3s;"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 4"></div>
                <div class="gallery-item hidden" style="transition-delay: 0.4s;"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 5"></div>
                <div class="gallery-item hidden" style="transition-delay: 0.5s;"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gallery Image 6"></div>
            </div>
        </div>
    </section>

                <a href="mailto:dananjayaprasad96@gmail.com" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
